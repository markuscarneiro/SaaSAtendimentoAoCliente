# docker-compose.yml — ambiente de desenvolvimento local
# Execução: docker compose up --build
# Reset completo: docker compose down -v
#
# Spec de referência: docs/sdd/specs/docker-execution-spec.md
# Portas configuráveis via .env (ver .env.docker.example)

services:

  # ----------------------------------------------------------
  # API — backend principal (apps/api)
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/saas_atendimento}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-use-at-least-32-random-characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-5}
      RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # ----------------------------------------------------------
  # Web — dashboard administrativo (apps/web)
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped

  # ----------------------------------------------------------
  # PostgreSQL — banco transacional
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_atendimento}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-saas_atendimento}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis — cache e rate limit
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
