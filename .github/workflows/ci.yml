name: CI

# Pipeline 100% Docker (docker-execution-spec.md, deployment-spec.md §8):
# nenhum passo instala Node.js, pnpm, PostgreSQL ou Redis no runner —
# tudo roda via `docker compose build` / `docker compose run --rm`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image (api)
        run: docker compose build api

      - name: Lint
        run: docker compose run --rm api pnpm lint

      - name: Typecheck
        run: docker compose run --rm api pnpm typecheck

      - name: Test
        run: docker compose run --rm api pnpm test

      - name: Build
        run: docker compose run --rm api pnpm build

      - name: Tear down
        if: always()
        run: docker compose down -v

  web:
    name: Web — lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image (web)
        run: docker compose build web

      - name: Lint
        run: docker compose run --rm web pnpm lint

      - name: Typecheck
        run: docker compose run --rm web pnpm typecheck

      - name: Test
        run: docker compose run --rm web pnpm test

      - name: Build
        run: docker compose run --rm web pnpm build

      - name: Tear down
        if: always()
        run: docker compose down -v

  docker-images:
    name: Build imagens de produção (runtime)
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem de produção — api
        run: docker build --target runtime -f apps/api/Dockerfile -t saas-atendimento-api:ci .

      - name: Build imagem de produção — web
        run: docker build --target runtime -f apps/web/Dockerfile -t saas-atendimento-web:ci .
